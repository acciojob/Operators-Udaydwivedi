<!DOCTYPE html>
<html>
<head>
  <title>Calculator and Text Change</title>
  <style>
    .division {
      border: 1px solid black;
      padding: 10px;
      margin: 5px;
      width: 120px;
    }
  </style>
</head>
<body>

  <h2>Calculator</h2>

  <input type="number" id="num1" placeholder="Enter first number">

  <input type="number" id="num2" placeholder="Enter second number">

  <select id="operator">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
  </select>

  <button id="calculate">Calculate</button>

  <div id="result"></div>

  <hr>

  <h2>Text Containers</h2>

  <div class="division">Hello</div>
  <div class="division">Welcome</div>
  <div class="division">To</div>
  <div class="division">My</div>
  <div class="division">Class</div>

  <button id="change_text">Change Text</button>

  <script>
    // Calculator Part
    document.getElementById("calculate").onclick = function () {

      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);
      const operator = document.getElementById("operator").value;

      let result;

      if (operator === "+") {
        result = num1 + num2;
      } 
      else if (operator === "-") {
        result = num1 - num2;
      } 
      else if (operator === "*") {
        result = num1 * num2;
      } 
      else if (operator === "/") {
        result = num1 / num2;
      }

      document.getElementById("result").innerText = result;
    };

    // Change Text Part
    document.getElementById("change_text").onclick = function () {

      const newText = [
        "Bye",
        "Good Bye",
        "To",
        "Your",
        "Class"
      ];

      const divisions = document.getElementsByClassName("division");

      for (let i = 0; i < divisions.length; i++) {
        divisions[i].innerText = newText[i];
      }
    };
  </script>

</body>
</html>
